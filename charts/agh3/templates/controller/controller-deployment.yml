{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  labels:
    {{- include "AGH3.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      {{- include "controller.imagePullSecrets" . | nindent 6 }}
      initContainers:
        {{- if .Values.redis.enabled }}
        - name: controller-init-redis
          image: {{ include "redis.image" . }}
          command:
            [
              "sh",
              "-c",
              "until redis-cli --no-auth-warning -h $REDIS_SERVICE_HOST -p $REDIS_SERVICE_PORT ping; do echo waiting for redis; sleep 1; done",
            ]
        {{- end }}
        - name: controller-init-postgresql
          image: {{ include "db.image" . }}
          env:
            - name: PG_CONN_STR
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controller.secret.db.secretName }}
                  key: DB_CONN_STR
          command:
            [
              "sh",
              "-c",
              "until pg_isready -d $PG_CONN_STR; do echo waiting for postgresql; sleep 1; done",
            ]
      containers:
        - name: controller
          image: {{ include "controller.image" . }}
          command:
            - ./controller
          envFrom:
            - prefix: SYSIMG_
              configMapRef:
                name: {{ .Values.shared.configMapName }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if and .Values.redis.enabled .Values.captain.service.redis.enabled }}
            - name: ENV_REDIS_CONN
              value: "redis://redis.$(NAMESPACE).svc.cluster.local:6379/0"
            {{- end }}
            {{- if .Values.exploitmgr.enabled }}
            - name: EXP_MGR_DB_Conn
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exploitmgr.secret.db.secretName }}
                  key: DB_CONN_STR
            {{- end }}
            {{- if .Values.exploitmgr.enabled }}
            - name: EXPLOITMGR_URL
              value: "exploitmgr.$(NAMESPACE).svc.cluster.local:50005"
            {{- end }}
            - name: MINIO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.secret.secretName }}
                  key: url
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controller.secret.minio.secretName }}
                  key: controller-minio-user
            - name: MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controller.secret.minio.secretName }}
                  key: controller-minio-password
            - name: DB_Conn
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controller.secret.db.secretName }}
                  key: "DB_CONN_STR"
            - name: CORE_URL
              value: "controller.$(NAMESPACE).svc.cluster.local:50005"
            - name: REGISTRY_URL
              value: {{ required "at least one of controller.env.REGISTRY_URL or global.imageRegistry is required" (coalesce .Values.controller.env.REGISTRY_URL .Values.global.imageRegistry) }}
            {{- if .Values.controller.extraEnv }}
            {{- include "common.tplvalues.render" (dict "value" .Values.controller.extraEnv "context" $) | nindent 12 }}
            {{- end }}
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
          ports:
            - name: grpc
              containerPort: 50005
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
      restartPolicy: Always
      automountServiceAccountToken: true
      serviceAccountName: controller-svc-account
{{- end }}
